<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Certificate Download Portal</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body>

    <header>

        <img src="assets/logo.png" class="logo">

        <h1>Lachoo Memorial College of Science and Technology</h1>
        <h2>Computer Science Department</h2>

        <h2>Git & GitHub Workshop</h2>

        <p>Certificate Download Portal</p>

    </header>

    <div class="container">

        <div class="search-box">

            <input
                type="text"
                id="searchInput"
                placeholder="Enter Student Name">

            <button onclick="searchCertificate()">

                Search

            </button>

        </div>

        <div id="result">

            <h3>No certificate selected.</h3>

            <p>Search using your name</p>

        </div>

    </div>

    <footer>

        © 2026 Lachoo Memorial College of Science and Technology| Git & GitHub Workshop

    </footer>
    
    <!-- SheetJS Library -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    
    <!-- JavaScript -->
    <script src="script.js"></script>


</body>

</html>
